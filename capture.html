<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>区域截图</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #4ea1ff;
        --accent-strong: #2f7fff;
        --panel: rgba(15, 18, 24, 0.92);
        --panel-border: rgba(255, 255, 255, 0.12);
        --text: #f5f8ff;
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Microsoft YaHei", sans-serif;
        user-select: none;
      }
      #root {
        position: relative;
        width: 100%;
        height: 100%;
        cursor: crosshair;
        visibility: hidden;
      }
      body[data-ready="true"] #root {
        visibility: visible;
      }
      #bg,
      #mask,
      #selection,
      #selectionImage,
      #selectionOutline,
      #toolbar,
      #sizeLabel {
        position: absolute;
      }
      #bg,
      #mask {
        inset: 0;
      }
      #bg {
        background-size: 100% 100%;
        background-position: 0 0;
        background-repeat: no-repeat;
      }
      #mask {
        background: rgba(0, 0, 0, 0.46);
      }
      #selection {
        display: none;
        box-sizing: border-box;
        z-index: 10;
      }
      #selectionImage,
      #selectionOutline {
        inset: 0;
      }
      #selectionImage {
        background-repeat: no-repeat;
        background-size: 100% 100%;
        border-radius: 2px;
      }
      #selectionOutline {
        border: 2px solid var(--accent);
        box-sizing: border-box;
        box-shadow: 0 0 0 1px rgba(255,255,255,.14), 0 12px 36px rgba(0,0,0,.22);
      }
      .handle {
        position: absolute;
        width: 12px;
        height: 12px;
        border-radius: 999px;
        background: #fff;
        border: 2px solid var(--accent-strong);
        box-sizing: border-box;
        box-shadow: 0 4px 10px rgba(0,0,0,.22);
      }
      .handle.corner { width: 14px; height: 14px; }
      .handle[data-dir="nw"] { left: -7px; top: -7px; cursor: nwse-resize; }
      .handle[data-dir="n"] { left: calc(50% - 6px); top: -6px; cursor: ns-resize; }
      .handle[data-dir="ne"] { right: -7px; top: -7px; cursor: nesw-resize; }
      .handle[data-dir="e"] { right: -6px; top: calc(50% - 6px); cursor: ew-resize; }
      .handle[data-dir="se"] { right: -7px; bottom: -7px; cursor: nwse-resize; }
      .handle[data-dir="s"] { left: calc(50% - 6px); bottom: -6px; cursor: ns-resize; }
      .handle[data-dir="sw"] { left: -7px; bottom: -7px; cursor: nesw-resize; }
      .handle[data-dir="w"] { left: -6px; top: calc(50% - 6px); cursor: ew-resize; }
      #toolbar {
        display: none;
        z-index: 20;
        align-items: center;
        gap: 7px;
        padding: 7px;
        border-radius: 16px;
        background: var(--panel);
        border: 1px solid var(--panel-border);
        box-shadow: 0 18px 48px rgba(0,0,0,.3);
        backdrop-filter: blur(12px);
      }
      #sizeLabel {
        display: none;
        z-index: 21;
        padding: 5px 9px;
        border-radius: 999px;
        background: rgba(9, 13, 18, 0.82);
        border: 1px solid rgba(255,255,255,.1);
        color: var(--text);
        font-size: 12px;
        line-height: 1;
        white-space: nowrap;
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 0;
        background: rgba(255,255,255,.08);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
      }
      button:hover { filter: brightness(1.08); }
      .toolButton {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 38px;
        height: 38px;
      }
      .toolIcon {
        width: 19px;
        height: 19px;
        display: block;
      }
      .primaryAction {
        background: linear-gradient(135deg, #2f7fff, #5e8cff);
      }
      .secondaryAction {
        background: rgba(255,255,255,.1);
      }
      .dangerAction {
        background: rgba(255, 82, 82, .18);
        color: #ffd2d2;
      }
      .runAction {
        background: linear-gradient(135deg, #8b5cf6, #2f7fff);
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="bg"></div>
      <div id="mask"></div>
      <div id="selection">
        <div id="selectionImage"></div>
        <div id="selectionOutline"></div>
        <div class="handle corner" data-dir="nw"></div>
        <div class="handle" data-dir="n"></div>
        <div class="handle corner" data-dir="ne"></div>
        <div class="handle" data-dir="e"></div>
        <div class="handle corner" data-dir="se"></div>
        <div class="handle" data-dir="s"></div>
        <div class="handle corner" data-dir="sw"></div>
        <div class="handle" data-dir="w"></div>
      </div>
      <div id="sizeLabel"></div>
      <div id="toolbar">
        <button id="cancelBtn" class="toolButton dangerAction" type="button" title="取消截图" aria-label="取消截图">
          <svg class="toolIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M6.5 6.5l11 11M17.5 6.5l-11 11" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" />
          </svg>
        </button>
        <button id="copyBtn" class="toolButton secondaryAction" type="button" title="复制图片到剪贴板" aria-label="复制图片到剪贴板">
          <svg class="toolIcon" viewBox="0 0 24 24" aria-hidden="true">
            <rect x="8" y="8" width="11" height="11" rx="2.2" fill="none" stroke="currentColor" stroke-width="2" />
            <path d="M5 15.5V6.8C5 5.8 5.8 5 6.8 5h8.7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <button id="pinBtn" class="toolButton primaryAction" type="button" title="固定图片到屏幕" aria-label="固定图片到屏幕">
          <svg class="toolIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8.5 3.8h7l-.8 4.1 2.9 2.9v2H6.4v-2l2.9-2.9-.8-4.1Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            <path d="M12 13v7" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M9.8 20h4.4" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
          </svg>
        </button>
        <button id="runBtn" class="toolButton runAction" type="button" title="固定并直接上传到 RunningHub 生图" aria-label="固定并直接上传到 RunningHub 生图">
          <svg class="toolIcon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8.5 3.8h7l-.8 4.1 2.9 2.9v2H6.4v-2l2.9-2.9-.8-4.1Z" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round" />
            <path d="M12 13v4" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
            <path d="M15.8 17.2l2.2 2.2-2.2 2.2" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" />
            <path d="M10.5 19.4H18" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" />
          </svg>
        </button>
      </div>
    </div>
    <script src="./capture.js"></script>
  </body>
</html>
