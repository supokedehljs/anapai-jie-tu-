<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>设置</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
        color: #eef3ff;
        background: transparent;
      }
      body { display: flex; }
      #app {
        flex: 1;
        display: grid;
        grid-template-rows: auto 1fr auto;
        margin: 0;
        border-radius: 14px;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(16,20,28,.97), rgba(10,13,18,.95));
        box-shadow: 0 18px 56px rgba(0,0,0,.38);
        border: 1px solid rgba(255,255,255,.08);
      }
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 14px 8px;
        border-bottom: 1px solid rgba(255,255,255,.06);
        -webkit-app-region: drag;
      }
      #titleWrap { display: flex; flex-direction: column; gap: 3px; min-width: 0; }
      #title { font-size: 17px; font-weight: 700; letter-spacing: .3px; }
      #subtitle { font-size: 11px; line-height: 1.35; color: rgba(232,238,249,.68); max-width: 760px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      #actions {
        display: flex;
        align-items: center;
        gap: 6px;
        -webkit-app-region: no-drag;
        flex-shrink: 0;
      }
      button {
        border: none;
        border-radius: 9px;
        padding: 6px 10px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: transform .15s ease, filter .15s ease, background .15s ease;
      }
      button:hover { filter: brightness(1.06); transform: translateY(-1px); }
      button:disabled { cursor: not-allowed; filter: none; transform: none; opacity: .55; }
      #saveBtnTop {
        background: linear-gradient(135deg, #4e86ff, #705cff);
        color: #fff;
        min-width: 76px;
      }
      #closeBtnTop {
        width: 28px;
        height: 28px;
        padding: 0;
        border-radius: 999px;
        background: linear-gradient(135deg, #ff5f6d, #ff3b30);
        color: #fff;
        font-size: 15px;
        line-height: 1;
      }
      #content {
        overflow: auto;
        padding: 10px 14px;
      }
      #stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .card {
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,.08);
        background: linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.03));
        overflow: hidden;
      }
      .cardHeader {
        padding: 9px 12px 6px;
      }
      .cardTitle {
        font-size: 14px;
        font-weight: 700;
      }
      .cardDesc {
        margin-top: 3px;
        font-size: 11px;
        line-height: 1.35;
        color: rgba(232,238,249,.62);
      }
      .cardBody {
        padding: 0 12px 10px;
      }
      .field {
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .field + .field,
      .switchItem + .switchItem,
      .switchList + .field,
      .field + .switchList {
        margin-top: 7px;
      }
      .fieldLabel {
        display: flex;
        justify-content: space-between;
        gap: 8px;
      }
      .fieldLabel strong { font-size: 12px; }
      .hint { font-size: 10px; color: rgba(237,243,255,.46); }
      input[type="text"] {
        width: 100%;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.09);
        background: rgba(6,10,16,.7);
        color: #f6f9ff;
        outline: none;
        font-size: 12px;
      }
      input[type="text"]:focus {
        border-color: rgba(91,140,255,.9);
        box-shadow: 0 0 0 4px rgba(91,140,255,.14);
      }
      .shortcutGrid {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .shortcutRow {
        display: grid;
        grid-template-columns: minmax(150px, 1fr) auto minmax(170px, 230px);
        align-items: center;
        gap: 10px;
        padding: 7px 9px;
        border-radius: 10px;
        background: rgba(255,255,255,.03);
        border: 1px solid rgba(255,255,255,.06);
      }
      .shortcutName { font-size: 12px; font-weight: 700; color: rgba(246,249,255,.94); }
      .shortcutRow input { text-align: right; padding: 7px 9px; border-radius: 9px; }
      .shortcutBadge {
        min-width: 74px;
        justify-self: end;
        padding: 3px 8px;
        border-radius: 999px;
        text-align: center;
        font-size: 10px;
        font-weight: 700;
        color: #7ee787;
        background: rgba(126, 231, 135, .12);
        border: 1px solid rgba(126, 231, 135, .24);
      }
      .shortcutBadge.error {
        color: #ffb3b3;
        background: rgba(255, 99, 99, .12);
        border-color: rgba(255, 99, 99, .24);
      }
      .switchList {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .switchItem {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        align-items: center;
        padding: 8px 10px;
        border-radius: 10px;
        border: 1px solid rgba(255,255,255,.06);
        background: rgba(255,255,255,.03);
      }
      .switchInfo strong { display: block; font-size: 12px; margin-bottom: 2px; }
      .switchInfo span { display: block; color: rgba(237,243,255,.62); font-size: 10px; line-height: 1.35; }
      .switch { position: relative; width: 42px; height: 24px; }
      .switch input { opacity: 0; width: 0; height: 0; }
      .slider { position: absolute; inset: 0; border-radius: 999px; background: rgba(255,255,255,.14); }
      .slider:before {
        content: "";
        position: absolute;
        width: 18px;
        height: 18px;
        left: 3px;
        top: 3px;
        border-radius: 50%;
        background: #fff;
        transition: transform .18s ease;
      }
      .switch input:checked + .slider { background: linear-gradient(135deg, #5d8dff, #7463ff); }
      .switch input:checked + .slider:before { transform: translateX(18px); }
      .inlineRow {
        display: flex;
        gap: 10px;
      }
      .inlineRow input { flex: 1; }
      #browseSaveDirectoryBtn {
        min-width: 88px;
        background: rgba(255,255,255,.08);
        color: #eef4ff;
      }
      .note {
        padding: 8px 10px;
        border-radius: 12px;
        border: 1px solid rgba(91,140,255,.18);
        background: rgba(91,140,255,.07);
        font-size: 11px;
        line-height: 1.55;
        color: rgba(230,238,255,.82);
      }
      #footer {
        display: block;
        padding: 7px 14px 8px;
        border-top: 1px solid rgba(255,255,255,.06);
        background: rgba(255,255,255,.015);
      }
      #status {
        min-height: 17px;
        font-size: 12px;
        color: #7ee787;
      }
      #status.error { color: #ff9d9d; }
      @media (max-width: 760px) {
        .inlineRow { flex-direction: column; }
        .shortcutRow { grid-template-columns: 1fr; gap: 6px; }
        .shortcutBadge { justify-self: start; }
        .shortcutRow input { text-align: left; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <div id="titleWrap">
          <div id="title">设置</div>
          <div id="subtitle">所有选项都集中在同一列里，不再分分类页。改成和工作流选择窗口一致的风格，去掉原来那种奇怪边框和菜单栏感。</div>
        </div>
        <div id="actions">
          <button id="saveBtnTop">保存</button>
          <button id="closeBtnTop" aria-label="关闭">✕</button>
        </div>
      </div>

      <div id="content">
        <div id="stack">
          <div class="card">
            <div class="cardHeader">
              <div class="cardTitle">RunningHub 接入</div>
              <div class="cardDesc">这里只需要配置 API Key。上传、创建任务、状态查询和 Webhook 详情接口都是 RunningHub OpenAPI 固定端点，通常不需要手动修改。</div>
            </div>
            <div class="cardBody">
              <label class="field">
                <div class="fieldLabel"><strong>API Key</strong><span class="hint">用于上传与创建任务</span></div>
                <input id="apiKey" type="text" placeholder="请输入 RunningHub API Key" />
              </label>
            </div>
          </div>

          <div class="card">
            <div class="cardHeader">
              <div class="cardTitle">全局快捷键</div>
              <div class="cardDesc">点击输入框后直接按下快捷键即可录入。右侧会显示当前快捷键是否已成功注册。</div>
            </div>
            <div class="cardBody">
              <div class="shortcutGrid">
                <label class="shortcutRow">
                  <span class="shortcutName">区域截图</span>
                  <span id="captureShortcutState" class="shortcutBadge">检测中</span>
                  <input id="captureShortcut" class="shortcut-input" type="text" placeholder="点击录入" readonly />
                </label>
                <label class="shortcutRow">
                  <span class="shortcutName">选择工作流窗口</span>
                  <span id="workflowShortcutState" class="shortcutBadge">检测中</span>
                  <input id="workflowShortcut" class="shortcut-input" type="text" placeholder="点击录入" readonly />
                </label>
                <label class="shortcutRow">
                  <span class="shortcutName">打开/关闭历史菜单</span>
                  <span id="historyShortcutState" class="shortcutBadge">检测中</span>
                  <input id="historyShortcut" class="shortcut-input" type="text" placeholder="点击录入" readonly />
                </label>
                <label class="shortcutRow">
                  <span class="shortcutName">显示隐藏所有置顶贴图</span>
                  <span id="togglePinnedShortcutState" class="shortcutBadge">检测中</span>
                  <input id="togglePinnedShortcut" class="shortcut-input" type="text" placeholder="点击录入" readonly />
                </label>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="cardHeader">
              <div class="cardTitle">行为与保存</div>
              <div class="cardDesc">控制截图完成后的默认行为，以及程序的常驻体验。</div>
            </div>
            <div class="cardBody">
              <div class="switchList">
                <label class="switchItem">
                  <div class="switchInfo"><strong>新贴图默认开启鼠标穿透</strong><span>适合作为参考图层，避免影响鼠标操作。</span></div>
                  <span class="switch"><input id="defaultClickThrough" type="checkbox" /><span class="slider"></span></span>
                </label>
                <label class="switchItem">
                  <div class="switchInfo"><strong>截图后自动复制到剪贴板</strong><span>截图完成时同步把图片写入系统剪贴板，便于快速粘贴。</span></div>
                  <span class="switch"><input id="autoCopyToClipboard" type="checkbox" /><span class="slider"></span></span>
                </label>
                <label class="field">
                  <div class="fieldLabel"><strong>默认保存位置</strong><span class="hint">点击贴图上的保存后会直接写入这里</span></div>
                  <div class="inlineRow">
                    <input id="defaultSaveDirectory" type="text" placeholder="请选择默认保存目录" />
                    <button id="browseSaveDirectoryBtn" type="button">浏览</button>
                  </div>
                </label>
                <label class="switchItem">
                  <div class="switchInfo"><strong>开机自动启动</strong><span>适合希望常驻托盘、随时调用截图能力的使用场景。</span></div>
                  <span class="switch"><input id="launchAtStartup" type="checkbox" /><span class="slider"></span></span>
                </label>
              </div>
            </div>
          </div>

          <div class="note">现在所有设置已经合并成统一单列，不再拆成分类页；顶部和窗口边缘风格也尽量对齐工作流选择窗口。</div>
        </div>
      </div>

      <div id="footer">
        <div id="status"></div>
      </div>
    </div>
    <script src="./settings.js"></script>
  </body>
</html>
