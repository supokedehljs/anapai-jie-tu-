<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择工作流</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Microsoft YaHei", sans-serif; color: #f6f8fc; background: transparent;
      }
      body { display: flex; background: transparent; }
      #app {
        flex: 1; display: flex; flex-direction: column; margin: 0; border-radius: 20px; overflow: hidden;
        background: linear-gradient(180deg, rgba(16,20,28,.96), rgba(10,13,18,.94));
        box-shadow: 0 24px 80px rgba(0,0,0,.42); border: 1px solid rgba(255,255,255,.08);
      }
      #topbar {
        display: flex; align-items: flex-start; justify-content: space-between; padding: 18px 22px 10px; gap: 16px;
        -webkit-app-region: drag;
      }
      #titleWrap { display: flex; flex-direction: column; gap: 6px; }
      #title { font-size: 20px; font-weight: 700; letter-spacing: .4px; }
      #subtitle {
        display: block; font-size: 12px; color: rgba(232,238,249,.72); line-height: 1.65;
        max-width: 640px;
      }
      #actions { display: flex; gap: 8px; -webkit-app-region: no-drag; }
      button {
        border: none; border-radius: 10px; padding: 8px 12px; font-size: 12px; font-weight: 600; cursor: pointer;
        transition: transform .15s ease, filter .15s ease, background .15s ease;
      }
      button:hover { filter: brightness(1.06); transform: translateY(-1px); }
      button:disabled { cursor: not-allowed; filter: none; transform: none; opacity: .55; }
      #runBtn {
        min-width: 64px;
        background: transparent; color: rgba(246,248,252,.9);
        border: 1px solid rgba(255,255,255,.16);
      }
      #closeBtn {
        width: 30px; height: 30px; padding: 0; border-radius: 0;
        background: transparent; color: rgba(246,248,252,.82); font-size: 18px; line-height: 1;
      }
      #uploadBtn {
        position: fixed; right: 18px; bottom: 18px; width: 36px; height: 36px; padding: 0;
        display: inline-flex; align-items: center; justify-content: center; border-radius: 999px;
        background: rgba(255,255,255,.12); color: rgba(245,248,255,.94); font-size: 20px; font-weight: 400;
        border: 1px solid rgba(255,255,255,.12);
        box-shadow: 0 8px 20px rgba(0,0,0,.18); z-index: 40;
      }
      .pickerBtn {
        background: rgba(255,255,255,.12); color: #eef3fb;
        min-width: 88px;
        padding: 8px 10px;
      }
      #cancelWorkflowBtn { background: rgba(255,255,255,.08); color: #eef3fb; }
      #content {
        flex: 1; min-height: 0; padding: 8px 22px 22px; display: flex; gap: 16px;
      }
      #leftPanel {
        width: 188px; min-width: 188px; align-self: flex-start; display: flex; flex-direction: column; gap: 8px;
        padding: 10px; border-radius: 16px; background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.08);
      }
      #leftPanelTitle { font-size: 13px; font-weight: 700; color: rgba(246,248,252,.94); }
      #inputImageBox {
        width: 100%; aspect-ratio: 1 / 1; min-height: 0; border-radius: 14px; border: 1px dashed rgba(255,255,255,.18);
        background: rgba(255,255,255,.035); display: flex; align-items: center; justify-content: center; overflow: hidden;
        position: relative;
      }
      #inputImageBox[data-dragging="true"] { border-color: rgba(74,136,255,.86); background: rgba(74,136,255,.12); }
      #inputImagePreview { width: 100%; height: 100%; object-fit: contain; display: none; }
      #inputImageBox[data-has-image="true"] #inputImagePreview { display: block; }
      #inputImageBox[data-has-image="true"] #inputImagePlaceholder,
      #inputImageBox[data-has-image="true"] #chooseInputImageBtn { display: none; }
      #inputImagePlaceholder {
        display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
        width: 100%; height: 100%; padding: 12px; text-align: center; color: rgba(232,238,249,.76); font-size: 11px; line-height: 1.55;
      }
      #chooseInputImageBtn {
        width: 64px; height: 64px; padding: 0; border-radius: 999px;
        display: inline-flex; align-items: center; justify-content: center;
        background: rgba(255,255,255,.1); color: rgba(246,248,252,.94);
        border: 1px solid rgba(255,255,255,.12); font-size: 36px; line-height: 1;
      }
      #chooseInputImageBtn:hover { background: rgba(74,136,255,.22); }
      #clearInputImageBtn {
        position: absolute; right: 8px; top: 8px; z-index: 6;
        display: none; width: 26px; height: 26px; padding: 0; border-radius: 999px;
        background: rgba(10,13,18,.72); color: #fff; border: 1px solid rgba(255,255,255,.18);
        font-size: 16px; line-height: 1;
      }
      #inputImageBox[data-has-image="true"] #clearInputImageBtn { display: inline-flex; align-items: center; justify-content: center; }
      #inputImageActions { display: flex; flex-direction: column; gap: 6px; }
      #inputImageActions button { padding: 7px 8px; font-size: 11px; }
      #pasteImageBtn { background: rgba(255,255,255,.1); color: #eef3fb; }
      #inputImageHint { min-height: 16px; font-size: 10px; line-height: 1.45; color: rgba(232,238,249,.56); }
      #workflowArea { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 12px; }
      #tips { display: none; }
      #grid {
        flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 200px)); gap: 16px;
        padding: 16px 16px 16px 8px;
        justify-content: start;
        align-content: start;
      }
      .card {
        position: relative; display: flex; flex-direction: column; padding: 0; border-radius: 18px;
        background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); cursor: pointer;
        transition: border-color .16s ease, box-shadow .16s ease, background .16s ease;
        overflow: hidden;
        width: 100%;
        aspect-ratio: 1 / 1;
      }
      .cardInfo {
        display: flex; flex-direction: column; gap: 4px; padding: 10px 12px 12px;
        background: linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,.025));
      }
      .cardName {
        color: rgba(246,248,252,.96); font-size: 13px; font-weight: 700; line-height: 1.35;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .cardTime {
        min-height: 16px; color: rgba(232,238,249,.58); font-size: 11px; line-height: 1.35;
        overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      }
      .card:hover {
        border-color: rgba(97,146,255,.56); background: rgba(255,255,255,.07);
        box-shadow: 0 0 0 1px rgba(97,146,255,.18);
      }
      .card.selected {
        border-color: #3d85ff;
        background: rgba(255,255,255,.08);
        box-shadow: 0 0 0 4px #3d85ff;
      }
      .thumb {
        aspect-ratio: 1 / 1; width: 100%; border-radius: 17px;
        background: linear-gradient(135deg, rgba(55,110,255,.16), rgba(138,73,255,.18));
        overflow: hidden; display: flex; align-items: center; justify-content: center;
      }
      .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .thumbPlaceholder, .thumbnailPreviewPlaceholder {
        display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 14px;
        color: rgba(237,242,252,.82); text-align: center; padding: 18px; box-sizing: border-box;
      }
      .selectedBadge {
        position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 999px;
        background: rgba(59,128,255,.92); color: #fff; font-size: 11px; font-weight: 700;
      }
      .workflowLinkBtn,
      .favoriteWorkflowBtn {
        position: absolute; top: 10px; width: 28px; height: 28px; padding: 0;
        display: inline-flex; align-items: center; justify-content: center; border-radius: 999px;
        background: rgba(20,24,30,.62); color: rgba(246,248,252,.92); border: 1px solid rgba(255,255,255,.16);
        z-index: 5;
      }
      .workflowLinkBtn { left: 10px; }
      .favoriteWorkflowBtn { left: 44px; }
      .favoriteWorkflowBtn[data-favorite="true"] { color: #ffd76a; background: rgba(70,49,10,.72); border-color: rgba(255,215,106,.42); }
      .workflowLinkBtn:hover,
      .favoriteWorkflowBtn:hover { background: rgba(255,255,255,.18); transform: none; }
      .starIcon { width: 16px; height: 16px; display: block; }
      .starIcon path { fill: transparent; stroke: currentColor; stroke-width: 1.9; stroke-linejoin: round; }
      .favoriteWorkflowBtn[data-favorite="true"] .starIcon path { fill: currentColor; }
      .linkIcon { position: relative; width: 16px; height: 12px; display: block; }
      .linkIcon::before,
      .linkIcon::after {
        content: ""; position: absolute; top: 3px; width: 9px; height: 5px; border: 2px solid currentColor;
        border-radius: 999px; transform: rotate(-32deg);
      }
      .linkIcon::before { left: 0; }
      .linkIcon::after { right: 0; }
      #cardMenu {
        position: fixed; display: none; min-width: 150px; padding: 6px; border-radius: 12px;
        background: rgba(18,23,32,.98); border: 1px solid rgba(255,255,255,.12);
        box-shadow: 0 18px 48px rgba(0,0,0,.4); z-index: 30;
      }
      #cardMenu[data-open="true"] { display: block; }
      .menuItem {
        display: block; width: 100%; text-align: left; padding: 9px 10px; border-radius: 9px;
        background: transparent; color: #eef3fb; font-size: 13px;
      }
      .menuItem:hover { background: rgba(255,255,255,.09); transform: none; filter: none; }
      .menuItem.danger { color: #ffd7d7; }
      .menuItem.danger:hover { background: rgba(255,92,92,.16); }
      #empty {
        display: none; flex: 1; align-items: center; justify-content: center; text-align: center; color: rgba(232,238,249,.72);
        font-size: 15px; border-radius: 18px; border: 1px dashed rgba(255,255,255,.16); background: rgba(255,255,255,.03);
      }
      #status { min-height: 20px; font-size: 13px; color: rgba(232,238,249,.72); }
      #modal {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.45);
        backdrop-filter: blur(8px); z-index: 20;
      }
      #modal[data-open="true"] { display: flex; }
      .modalPanel {
        width: min(620px, calc(100vw - 48px)); max-height: calc(100vh - 48px); overflow: auto; border-radius: 18px;
        background: linear-gradient(180deg, rgba(16,20,28,.98), rgba(10,13,18,.98)); border: 1px solid rgba(255,255,255,.1);
        box-shadow: 0 28px 80px rgba(0,0,0,.45); padding: 18px; box-sizing: border-box;
      }
      .modalHeader { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
      .modalTitle { font-size: 18px; font-weight: 700; }
      .modalHint {
        display: block; font-size: 12px; line-height: 1.55; color: rgba(232,238,249,.68);
      }
      #workflowForm { display: flex; flex-direction: column; gap: 12px; }
      .formSection {
        display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px 12px; padding: 12px; border-radius: 16px;
        background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.08);
      }
      .formSection.compact { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .sectionTitle { grid-column: 1 / -1; font-size: 13px; font-weight: 700; color: rgba(242,246,255,.9); }
      .field { display: flex; flex-direction: column; gap: 6px; }
      .field.full, .formSection > .full { grid-column: 1 / -1; }
      .fieldLabel { font-size: 12px; color: rgba(242,246,255,.86); }
      input {
        width: 100%; box-sizing: border-box; border: 1px solid rgba(255,255,255,.1); border-radius: 10px;
        background: rgba(255,255,255,.06); color: #eef3fb; padding: 9px 10px; font-size: 13px; outline: none;
      }
      input:focus { border-color: rgba(74,136,255,.86); box-shadow: 0 0 0 3px rgba(61,133,255,.16); }
      input[type="checkbox"] { width: auto; accent-color: #4f8cff; }
      .checkboxField { flex-direction: row; align-items: center; gap: 8px; }
      .checkboxField .fieldLabel { cursor: pointer; }
      .fieldHint { font-size: 11px; line-height: 1.45; color: rgba(232,238,249,.56); }
      input[readonly] { color: rgba(238,243,251,.78); }
      .filePickerRow { display: flex; gap: 10px; }
      .filePickerRow input { flex: 1; }
      .pickerBtn { min-width: 112px; }
      .thumbnailPreview {
        margin-top: 0; min-height: 96px; max-height: 150px; border-radius: 14px; border: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.04); overflow: hidden; display: flex; align-items: center; justify-content: center;
      }
      .thumbnailPreview img { width: 100%; max-height: 150px; object-fit: cover; display: none; }
      .thumbnailPreview[data-has-image="true"] img { display: block; }
      .thumbnailPreview[data-has-image="true"] .thumbnailPreviewPlaceholder { display: none; }
      .modalActions { display: flex; justify-content: flex-end; gap: 10px; }
      #saveWorkflowBtn { background: linear-gradient(135deg, #3d85ff, #6b5cff); color: #fff; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 999px; }
      ::-webkit-scrollbar-track { background: transparent; }
      @media (max-width: 760px) {
        .formSection { grid-template-columns: 1fr; }
        .filePickerRow { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <div id="titleWrap">
          <div id="title">选择工作流</div>
          <div id="subtitle">这里会显示你已导入的工作流缩略图。左键选中，右键管理；确认后可直接点击右上角运行。</div>
        </div>
        <div id="actions">
          <button id="runBtn" disabled>运行</button>
          <button id="closeBtn" aria-label="关闭">✕</button>
        </div>
      </div>
      <div id="content">
        <aside id="leftPanel">
          <div id="leftPanelTitle">处理图片</div>
          <div id="inputImageBox" data-has-image="false" data-dragging="false">
            <img id="inputImagePreview" alt="当前处理图片" />
            <button id="clearInputImageBtn" type="button" title="取消当前图片" aria-label="取消当前图片">×</button>
            <div id="inputImagePlaceholder">
              <button id="chooseInputImageBtn" type="button" title="从文件夹中导入" aria-label="从文件夹中导入">+</button>
              <span>从文件夹中导入</span>
            </div>
          </div>
          <div id="inputImageActions">
            <button id="pasteImageBtn" type="button">从剪贴板放入图片</button>
          </div>
          <div id="inputImageHint">没有选中置顶图时，可在这里临时放入图片。</div>
        </aside>
        <section id="workflowArea">
          <div id="tips"></div>
          <div id="empty">当前还没有工作流。点击右下角 + 导入新的 JSON。</div>
          <div id="grid"></div>
          <div id="status"></div>
        </section>
      </div>
    </div>
    <button id="uploadBtn" title="上传工作流" aria-label="上传工作流">+</button>
    <div id="cardMenu" data-open="false">
      <button class="menuItem" type="button" data-menu-action="edit">编辑配置</button>
      <button class="menuItem danger" type="button" data-menu-action="delete">删除工作流</button>
    </div>
    <div id="modal" data-open="false">
      <div class="modalPanel">
        <div class="modalHeader">
          <div id="modalTitle" class="modalTitle">上传新的工作流</div>
          <div id="modalHint" class="modalHint">请填写工作流基础信息。JSON 文件用于导入工作流本体，缩略图是可选项，只用于界面展示。</div>
        </div>
        <form id="workflowForm">
          <div class="formSection" data-mode="import">
            <div class="sectionTitle">JSON 文件</div>
            <label class="field full">
              <div class="fieldLabel">工作流 JSON 文件</div>
              <div class="filePickerRow">
                <input id="workflowJsonPath" type="text" placeholder="请选择工作流 JSON 文件，名称会自动沿用文件名" readonly />
                <button id="chooseWorkflowJsonBtn" type="button" class="pickerBtn">选择 JSON</button>
              </div>
            </label>
            <input id="workflowFileName" type="hidden" />
          </div>
          <div class="formSection compact">
            <div class="sectionTitle">运行参数</div>
            <label class="field full">
              <div class="fieldLabel">网页工作流 ID</div>
              <input id="workflowId" type="text" placeholder="例如：2046084739047628802" />
            </label>
            <label class="field">
              <div class="fieldLabel">输入图像节点 ID</div>
              <input id="imageNodeId" type="text" placeholder="36" value="36" />
            </label>
            <label class="field">
              <div class="fieldLabel">输入图像字段名</div>
              <input id="imageFieldName" type="text" placeholder="image" value="image" />
            </label>
            <label class="field">
              <div class="fieldLabel">出图节点 ID</div>
              <input id="outputNodeId" type="text" placeholder="可留空" />
            </label>
          </div>
          <div class="formSection">
            <div class="sectionTitle">结果处理</div>
            <label class="field full checkboxField">
              <input id="duckDecodeEnabled" type="checkbox" />
              <span class="fieldLabel">鸭鸭 解码</span>
            </label>
            <label class="field full">
              <div class="fieldLabel">鸭鸭解码密码</div>
              <input id="duckDecodePassword" type="text" placeholder="没有密码可留空" />
              <div class="fieldHint">勾选后，云端返回的结果图会先按鸭鸭图格式解码，再显示到置顶贴图。</div>
            </label>
          </div>
          <div class="formSection">
            <div class="sectionTitle">缩略图</div>
            <label class="field full">
              <div class="fieldLabel">工作流缩略图</div>
              <div class="filePickerRow">
                <input id="workflowThumbnailPath" type="text" placeholder="可选：请选择缩略图文件" readonly />
                <button id="chooseWorkflowThumbnailBtn" type="button" class="pickerBtn">选择缩略图</button>
              </div>
            </label>
            <div id="thumbnailPreview" class="thumbnailPreview full" data-has-image="false">
              <img id="thumbnailPreviewImage" alt="工作流缩略图预览" />
              <div class="thumbnailPreviewPlaceholder">暂无缩略图</div>
            </div>
          </div>
          <div class="modalActions">
            <button id="cancelWorkflowBtn" type="button">取消</button>
            <button id="saveWorkflowBtn" type="submit">保存</button>
          </div>
        </form>
      </div>
    </div>
    <script src="./workflow-selector.js"></script>
  </body>
</html>
