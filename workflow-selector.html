<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择工作流</title>
    <style>
      :root { color-scheme: dark; }
      html, body {
        margin: 0; width: 100%; height: 100%; overflow: hidden;
        font-family: "Microsoft YaHei", sans-serif; color: #f6f8fc; background: transparent;
      }
      body { display: flex; }
      #app {
        flex: 1; display: flex; flex-direction: column; margin: 14px; border-radius: 22px; overflow: hidden;
        background: linear-gradient(180deg, rgba(16,20,28,.96), rgba(10,13,18,.94));
        box-shadow: 0 24px 80px rgba(0,0,0,.42); border: 1px solid rgba(255,255,255,.08);
      }
      #topbar {
        display: flex; align-items: center; justify-content: space-between; padding: 18px 22px 12px; gap: 16px;
        -webkit-app-region: drag;
      }
      #titleWrap { display: flex; flex-direction: column; gap: 4px; }
      #title { font-size: 20px; font-weight: 700; letter-spacing: .5px; }
      #subtitle { font-size: 13px; color: rgba(232,238,249,.7); }
      #actions { display: flex; gap: 10px; -webkit-app-region: no-drag; }
      button {
        border: none; border-radius: 12px; padding: 10px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
        transition: transform .15s ease, filter .15s ease, background .15s ease;
      }
      button:hover { filter: brightness(1.06); transform: translateY(-1px); }
      button:disabled { cursor: not-allowed; filter: none; transform: none; opacity: .55; }
      #runBtn { background: linear-gradient(135deg, #3d85ff, #6b5cff); color: #fff; }
      #uploadBtn, .pickerBtn { background: rgba(255,255,255,.12); color: #eef3fb; }
      #closeBtn, #cancelWorkflowBtn { background: rgba(255,255,255,.08); color: #eef3fb; }
      #content { flex: 1; min-height: 0; padding: 10px 22px 22px; display: flex; flex-direction: column; gap: 14px; }
      #tips { font-size: 13px; color: rgba(232,238,249,.74); }
      #grid {
        flex: 1; min-height: 0; overflow: auto; display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; align-content: start; padding-right: 6px;
      }
      .card {
        position: relative; display: block; padding: 0; border-radius: 18px;
        background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); cursor: pointer;
        transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease;
        overflow: hidden;
      }
      .card:hover {
        transform: translateY(-2px); border-color: rgba(97,146,255,.56); background: rgba(255,255,255,.07);
        box-shadow: 0 14px 30px rgba(22,36,67,.24);
      }
      .card.selected {
        border-color: rgba(82,153,255,.95);
        background: linear-gradient(180deg, rgba(55,110,255,.2), rgba(255,255,255,.06));
        box-shadow: 0 16px 34px rgba(53,112,255,.22);
      }
      .thumb {
        aspect-ratio: 1 / 1; width: 100%; border-radius: 17px;
        background: linear-gradient(135deg, rgba(55,110,255,.16), rgba(138,73,255,.18));
        overflow: hidden; display: flex; align-items: center; justify-content: center;
      }
      .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .thumbPlaceholder, .thumbnailPreviewPlaceholder {
        display: flex; align-items: center; justify-content: center; width: 100%; height: 100%; font-size: 14px;
        color: rgba(237,242,252,.82); text-align: center; padding: 18px; box-sizing: border-box;
      }
      .selectedBadge {
        position: absolute; top: 10px; right: 10px; padding: 4px 8px; border-radius: 999px;
        background: rgba(59,128,255,.92); color: #fff; font-size: 11px; font-weight: 700;
      }
      #cardMenu {
        position: fixed; display: none; min-width: 150px; padding: 6px; border-radius: 12px;
        background: rgba(18,23,32,.98); border: 1px solid rgba(255,255,255,.12);
        box-shadow: 0 18px 48px rgba(0,0,0,.4); z-index: 30;
      }
      #cardMenu[data-open="true"] { display: block; }
      .menuItem {
        display: block; width: 100%; text-align: left; padding: 9px 10px; border-radius: 9px;
        background: transparent; color: #eef3fb; font-size: 13px;
      }
      .menuItem:hover { background: rgba(255,255,255,.09); transform: none; filter: none; }
      .menuItem.danger { color: #ffd7d7; }
      .menuItem.danger:hover { background: rgba(255,92,92,.16); }
      #empty {
        display: none; flex: 1; align-items: center; justify-content: center; text-align: center; color: rgba(232,238,249,.72);
        font-size: 15px; border-radius: 18px; border: 1px dashed rgba(255,255,255,.16); background: rgba(255,255,255,.03);
      }
      #status { min-height: 20px; font-size: 13px; color: rgba(232,238,249,.72); }
      #modal {
        position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(0,0,0,.45);
        backdrop-filter: blur(8px); z-index: 20;
      }
      #modal[data-open="true"] { display: flex; }
      .modalPanel {
        width: min(680px, calc(100vw - 48px)); max-height: calc(100vh - 48px); overflow: auto; border-radius: 20px;
        background: linear-gradient(180deg, rgba(16,20,28,.98), rgba(10,13,18,.98)); border: 1px solid rgba(255,255,255,.1);
        box-shadow: 0 28px 80px rgba(0,0,0,.45); padding: 22px; box-sizing: border-box;
      }
      .modalHeader { display: flex; flex-direction: column; gap: 6px; margin-bottom: 18px; }
      .modalTitle { font-size: 20px; font-weight: 700; }
      .modalHint { display: none; }
      #workflowForm { display: flex; flex-direction: column; gap: 18px; }
      .formSection {
        display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; padding: 16px; border-radius: 18px;
        background: rgba(255,255,255,.035); border: 1px solid rgba(255,255,255,.08);
      }
      .sectionTitle { grid-column: 1 / -1; font-size: 13px; font-weight: 700; color: rgba(242,246,255,.9); }
      .field { display: flex; flex-direction: column; gap: 8px; }
      .field.full, .formSection > .full { grid-column: 1 / -1; }
      .fieldLabel { font-size: 13px; color: rgba(242,246,255,.86); }
      input {
        width: 100%; box-sizing: border-box; border: 1px solid rgba(255,255,255,.1); border-radius: 12px;
        background: rgba(255,255,255,.06); color: #eef3fb; padding: 12px 13px; font-size: 14px; outline: none;
      }
      input:focus { border-color: rgba(74,136,255,.86); box-shadow: 0 0 0 3px rgba(61,133,255,.16); }
      input[readonly] { color: rgba(238,243,251,.78); }
      .filePickerRow { display: flex; gap: 10px; }
      .filePickerRow input { flex: 1; }
      .pickerBtn { min-width: 112px; }
      .thumbnailPreview {
        margin-top: 2px; min-height: 180px; border-radius: 16px; border: 1px solid rgba(255,255,255,.08);
        background: rgba(255,255,255,.04); overflow: hidden; display: flex; align-items: center; justify-content: center;
      }
      .thumbnailPreview img { width: 100%; max-height: 280px; object-fit: cover; display: none; }
      .thumbnailPreview[data-has-image="true"] img { display: block; }
      .thumbnailPreview[data-has-image="true"] .thumbnailPreviewPlaceholder { display: none; }
      .modalActions { display: flex; justify-content: flex-end; gap: 10px; }
      #saveWorkflowBtn { background: linear-gradient(135deg, #3d85ff, #6b5cff); color: #fff; }
      ::-webkit-scrollbar { width: 10px; height: 10px; }
      ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.16); border-radius: 999px; }
      ::-webkit-scrollbar-track { background: transparent; }
      @media (max-width: 760px) {
        .formSection { grid-template-columns: 1fr; }
        .filePickerRow { flex-direction: column; }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <div id="titleWrap">
          <div id="title">选择工作流</div>
          <div id="subtitle">选择、上传并管理你的 JSON 工作流</div>
        </div>
        <div id="actions">
          <button id="uploadBtn">上传工作流</button>
          <button id="runBtn" disabled>运行当前工作流</button>
          <button id="closeBtn">关闭</button>
        </div>
      </div>
      <div id="content">
        <div id="tips">这里展示 `runninghub-workflows` 目录中的所有 JSON 工作流。每张卡片只显示缩略图；左键选择，右键可编辑配置或删除工作流。</div>
        <div id="empty">当前还没有工作流。点击右上角“上传工作流”导入新的 JSON。</div>
        <div id="grid"></div>
        <div id="status"></div>
      </div>
    </div>
    <div id="cardMenu" data-open="false">
      <button class="menuItem" type="button" data-menu-action="edit">编辑配置</button>
      <button class="menuItem danger" type="button" data-menu-action="delete">删除工作流</button>
    </div>
    <div id="modal" data-open="false">
      <div class="modalPanel">
        <div class="modalHeader">
          <div id="modalTitle" class="modalTitle">上传新的工作流</div>
          <div id="modalHint" class="modalHint"></div>
        </div>
        <form id="workflowForm">
          <div class="formSection" data-mode="import">
            <div class="sectionTitle">JSON 文件</div>
            <label class="field full">
              <div class="fieldLabel">工作流 JSON 文件</div>
              <div class="filePickerRow">
                <input id="workflowJsonPath" type="text" placeholder="请选择工作流 JSON 文件" readonly />
                <button id="chooseWorkflowJsonBtn" type="button" class="pickerBtn">选择 JSON</button>
              </div>
            </label>
            <label class="field full">
              <div class="fieldLabel">JSON 保存名称</div>
              <input id="workflowFileName" type="text" placeholder="例如：my-img2img-workflow" />
            </label>
          </div>
          <div class="formSection">
            <div class="sectionTitle">运行参数</div>
            <label class="field full">
              <div class="fieldLabel">网页工作流 ID</div>
              <input id="workflowId" type="text" placeholder="例如：2046084739047628802" />
            </label>
            <label class="field">
              <div class="fieldLabel">输入图像节点 ID</div>
              <input id="imageNodeId" type="text" placeholder="36" value="36" />
            </label>
            <label class="field">
              <div class="fieldLabel">输入图像字段名</div>
              <input id="imageFieldName" type="text" placeholder="image" value="image" />
            </label>
            <label class="field full">
              <div class="fieldLabel">出图节点 ID</div>
              <input id="outputNodeId" type="text" placeholder="可留空" />
            </label>
          </div>
          <div class="formSection">
            <div class="sectionTitle">缩略图</div>
            <label class="field full">
              <div class="fieldLabel">工作流缩略图</div>
              <div class="filePickerRow">
                <input id="workflowThumbnailPath" type="text" placeholder="可选：请选择缩略图文件" readonly />
                <button id="chooseWorkflowThumbnailBtn" type="button" class="pickerBtn">选择缩略图</button>
              </div>
            </label>
            <div id="thumbnailPreview" class="thumbnailPreview full" data-has-image="false">
              <img id="thumbnailPreviewImage" alt="工作流缩略图预览" />
              <div class="thumbnailPreviewPlaceholder">暂无缩略图</div>
            </div>
          </div>
          <div class="modalActions">
            <button id="cancelWorkflowBtn" type="button">取消</button>
            <button id="saveWorkflowBtn" type="submit">保存</button>
          </div>
        </form>
      </div>
    </div>
    <script src="./workflow-selector.js"></script>
  </body>
</html>
