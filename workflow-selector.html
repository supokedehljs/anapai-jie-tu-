<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>选择工作流</title>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: "Microsoft YaHei", sans-serif;
        color: #f6f8fc;
        background: transparent;
      }
      body {
        display: flex;
        align-items: stretch;
        justify-content: stretch;
      }
      #app {
        flex: 1;
        display: flex;
        flex-direction: column;
        margin: 14px;
        border-radius: 22px;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(16, 20, 28, 0.96), rgba(10, 13, 18, 0.94));
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.42);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      #topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 18px 22px 12px;
        gap: 16px;
        -webkit-app-region: drag;
      }
      #titleWrap {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      #title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      #subtitle {
        font-size: 13px;
        color: rgba(232, 238, 249, 0.7);
      }
      #actions {
        display: flex;
        gap: 10px;
        -webkit-app-region: no-drag;
      }
      button {
        border: none;
        border-radius: 12px;
        padding: 10px 16px;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.15s ease, filter 0.15s ease, background 0.15s ease;
      }
      button:hover {
        filter: brightness(1.06);
        transform: translateY(-1px);
      }
      button:disabled {
        cursor: not-allowed;
        filter: none;
        transform: none;
        opacity: 0.55;
      }
      #runBtn {
        background: linear-gradient(135deg, #3d85ff, #6b5cff);
        color: #fff;
      }
      #closeBtn {
        background: rgba(255, 255, 255, 0.1);
        color: #eef3fb;
      }
      #content {
        flex: 1;
        min-height: 0;
        padding: 10px 22px 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
      }
      #tips {
        font-size: 13px;
        color: rgba(232, 238, 249, 0.74);
      }
      #grid {
        flex: 1;
        min-height: 0;
        overflow: auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
        gap: 16px;
        align-content: start;
        padding-right: 6px;
      }
      .card {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 10px;
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
        transition: transform 0.16s ease, border-color 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
      }
      .card:hover {
        transform: translateY(-2px);
        border-color: rgba(97, 146, 255, 0.56);
        background: rgba(255, 255, 255, 0.07);
        box-shadow: 0 14px 30px rgba(22, 36, 67, 0.24);
      }
      .card.selected {
        border-color: rgba(82, 153, 255, 0.95);
        background: linear-gradient(180deg, rgba(55, 110, 255, 0.2), rgba(255, 255, 255, 0.06));
        box-shadow: 0 16px 34px rgba(53, 112, 255, 0.22);
      }
      .thumb {
        aspect-ratio: 1 / 1;
        width: 100%;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(55, 110, 255, 0.16), rgba(138, 73, 255, 0.18));
        border: 1px solid rgba(255, 255, 255, 0.08);
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .thumb img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .thumbPlaceholder {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 100%;
        font-size: 15px;
        color: rgba(237, 242, 252, 0.82);
        text-align: center;
        padding: 18px;
        box-sizing: border-box;
      }
      .name {
        font-size: 14px;
        font-weight: 700;
        line-height: 1.45;
        word-break: break-word;
      }
      .file {
        font-size: 12px;
        color: rgba(232, 238, 249, 0.56);
        word-break: break-all;
      }
      .selectedBadge {
        position: absolute;
        top: 10px;
        right: 10px;
        padding: 4px 8px;
        border-radius: 999px;
        background: rgba(59, 128, 255, 0.92);
        color: #fff;
        font-size: 11px;
        font-weight: 700;
      }
      #empty {
        display: none;
        flex: 1;
        align-items: center;
        justify-content: center;
        text-align: center;
        color: rgba(232, 238, 249, 0.72);
        font-size: 15px;
        border-radius: 18px;
        border: 1px dashed rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.03);
      }
      #status {
        min-height: 20px;
        font-size: 13px;
        color: rgba(232, 238, 249, 0.72);
      }
      ::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.16);
        border-radius: 999px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="topbar">
        <div id="titleWrap">
          <div id="title">选择工作流</div>
          <div id="subtitle">空格打开此界面，选择一个 JSON 工作流后直接运行</div>
        </div>
        <div id="actions">
          <button id="runBtn" disabled>运行当前工作流</button>
          <button id="closeBtn">关闭</button>
        </div>
      </div>
      <div id="content">
        <div id="tips">展示的是 `runninghub-workflows` 目录中的全部 JSON 文件；缩略图会自动读取与 JSON 同名的图片文件。</div>
        <div id="empty">当前工作流目录中还没有 JSON 文件。</div>
        <div id="grid"></div>
        <div id="status"></div>
      </div>
    </div>
    <script src="./workflow-selector.js"></script>
  </body>
</html>
