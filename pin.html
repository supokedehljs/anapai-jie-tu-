<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贴图</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Microsoft YaHei", sans-serif;
        background: transparent;
        color: #f7f9fc;
      }
      body {
        overflow: hidden;
      }
      body.selected #frame {
        border-color: rgba(50, 132, 255, 0.95);
        box-shadow: inset 0 0 0 2px rgba(50, 132, 255, 0.24);
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        -webkit-app-region: no-drag;
        cursor: grab;
      }
      #stage:active {
        cursor: grabbing;
      }
      #dragHandle {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        height: 18px;
        z-index: 2;
        -webkit-app-region: drag;
      }
      #tabsBar {
        position: absolute;
        left: 12px;
        top: 10px;
        right: 96px;
        min-height: 34px;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0;
        z-index: 6;
        pointer-events: none;
        flex-wrap: wrap;
      }
      body.has-tabs #tabsBar {
        display: flex;
      }
      .tab {
        width: 30px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(20, 24, 30, 0.44);
        color: rgba(247, 249, 252, 0.92);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        pointer-events: auto;
        backdrop-filter: blur(10px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .tab:hover {
        transform: translateY(-1px) scale(1.04);
        background: rgba(42, 48, 58, 0.62);
      }
      .tab.active {
        background: rgba(255, 255, 255, 0.92);
        color: #162030;
        font-weight: 700;
        border-color: rgba(255, 255, 255, 0.68);
      }
      #frame {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        overflow: hidden;
        box-sizing: border-box;
        border: 2px solid transparent;
        transition: box-shadow 0.16s ease, border-color 0.16s ease;
        background: rgba(8, 12, 18, 0.18);
      }
      #imageViewport {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      #img {
        width: 100%;
        height: 100%;
        object-fit: fill;
        user-select: none;
        pointer-events: none;
        display: block;
      }
      #toolbar {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
        padding: 6px;
        border-radius: 8px;
        background: rgba(20, 24, 30, 0.62);
        backdrop-filter: blur(8px);
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.16s ease, transform 0.16s ease;
        -webkit-app-region: no-drag;
        z-index: 7;
      }
      #stage:hover #toolbar {
        opacity: 1;
        transform: translateY(0);
      }
      #hint {
        position: absolute;
        left: 8px;
        top: 8px;
        display: flex;
        gap: 4px;
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(20, 24, 30, 0.5);
        font-size: 12px;
        opacity: 0;
        transition: opacity 0.16s ease;
        pointer-events: none;
        z-index: 7;
      }
      body.has-tabs #hint {
        top: 48px;
      }
      #stage:hover #hint {
        opacity: 1;
      }
      #runningStatus {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 8px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(20, 24, 30, 0.76);
        font-size: 12px;
        line-height: 1.35;
        opacity: 0;
        transition: opacity 0.16s ease;
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        z-index: 7;
      }
      body.show-running-status #runningStatus {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="dragHandle"></div>
      <div id="tabsBar" role="tablist" aria-label="贴图图片列表"></div>
      <div id="frame">
        <div id="imageViewport">
          <img id="img" alt="截图结果" />
        </div>
      </div>
      <div id="toolbar">
        <button id="saveBtn">保存</button>
      </div>
      <div id="runningStatus"></div>
    </div>
    <script src="./pin.js"></script>
  </body>
</html>
