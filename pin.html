<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>贴图</title>
    <style>
      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        font-family: "Microsoft YaHei", sans-serif;
        background: transparent;
        color: #f7f9fc;
      }
      body {
        overflow: hidden;
      }
      body.selected #frame {
        border-color: rgba(50, 132, 255, 0.95);
        box-shadow: inset 0 0 0 2px rgba(50, 132, 255, 0.24);
      }
      #stage {
        position: relative;
        width: 100%;
        height: 100%;
        -webkit-app-region: no-drag;
        cursor: grab;
      }
      #stage:active {
        cursor: grabbing;
      }
      body.alt-adjusting #stage {
        cursor: crosshair;
      }
      body.alt-adjusting #frame {
        opacity: .9;
      }
      #scaleAnchor {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 24px;
        height: 24px;
        margin-left: -12px;
        margin-top: -12px;
        opacity: 0;
        pointer-events: none;
        z-index: 8;
        filter: drop-shadow(0 2px 5px rgba(0,0,0,.45));
      }
      #scaleAnchor::before,
      #scaleAnchor::after {
        content: "";
        position: absolute;
        left: 50%;
        top: 50%;
        background: #ff2d2d;
        border-radius: 999px;
        box-shadow: 0 0 0 1px rgba(255,255,255,.82);
      }
      #scaleAnchor::before {
        width: 24px;
        height: 3px;
        transform: translate(-50%, -50%);
      }
      #scaleAnchor::after {
        width: 3px;
        height: 24px;
        transform: translate(-50%, -50%);
      }
      body.alt-adjusting #scaleAnchor {
        opacity: 1;
      }
      body.scale-anchor-pulse #scaleAnchor {
        animation: anchorPulse .26s ease-out;
      }
      @keyframes anchorPulse {
        0% { transform: scale(1); }
        50% { transform: scale(1.45); }
        100% { transform: scale(1); }
      }
      #dragHandle {
        position: absolute;
        left: 0;
        top: 0;
        right: 0;
        height: 18px;
        z-index: 2;
        -webkit-app-region: drag;
      }
      #tabsBar {
        position: absolute;
        left: 12px;
        top: 10px;
        right: 96px;
        min-height: 34px;
        display: none;
        align-items: center;
        gap: 8px;
        padding: 0;
        z-index: 6;
        pointer-events: none;
        flex-wrap: wrap;
      }
      body.has-tabs #tabsBar {
        display: flex;
      }
      .tab {
        width: 30px;
        height: 30px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 999px;
        background: rgba(20, 24, 30, 0.44);
        color: rgba(247, 249, 252, 0.92);
        font-size: 12px;
        line-height: 1;
        cursor: pointer;
        pointer-events: auto;
        backdrop-filter: blur(10px);
        box-shadow: 0 6px 14px rgba(0, 0, 0, 0.12);
        transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
      }
      .tab:hover {
        transform: translateY(-1px) scale(1.04);
        background: rgba(42, 48, 58, 0.62);
      }
      .tab.active {
        background: rgba(255, 255, 255, 0.92);
        color: #162030;
        font-weight: 700;
        border-color: rgba(255, 255, 255, 0.68);
      }
      #frame {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border-radius: 10px;
        overflow: hidden;
        box-sizing: border-box;
        border: 2px solid transparent;
        transition: box-shadow 0.16s ease, border-color 0.16s ease;
        background: rgba(8, 12, 18, 0.18);
      }
      #imageViewport {
        position: absolute;
        inset: 0;
        overflow: hidden;
      }
      #img {
        width: 100%;
        height: 100%;
        object-fit: fill;
        user-select: none;
        pointer-events: none;
        display: block;
      }
      #toolbar {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 6px;
        padding: 0;
        border-radius: 999px;
        background: transparent;
        opacity: 0;
        transform: translateY(-4px);
        transition: opacity 0.16s ease, transform 0.16s ease;
        -webkit-app-region: no-drag;
        z-index: 7;
      }
      #saveBtn {
        width: 34px;
        height: 34px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: rgba(20, 24, 30, 0.72);
        color: #fff;
        cursor: pointer;
        backdrop-filter: blur(8px);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
        transition: transform 0.16s ease, background 0.16s ease, box-shadow 0.16s ease;
      }
      #saveBtn:hover {
        transform: translateY(-1px) scale(1.04);
        background: rgba(50, 132, 255, 0.92);
        box-shadow: 0 10px 24px rgba(50, 132, 255, 0.28);
      }
      #saveBtn svg {
        width: 17px;
        height: 17px;
        display: block;
      }
      #stage:hover #toolbar {
        opacity: 1;
        transform: translateY(0);
      }
      #hint {
        position: absolute;
        left: 8px;
        top: 8px;
        display: flex;
        gap: 4px;
        padding: 2px 6px;
        border-radius: 6px;
        background: rgba(20, 24, 30, 0.5);
        font-size: 12px;
        opacity: 0;
        transition: opacity 0.16s ease;
        pointer-events: none;
        z-index: 7;
      }
      body.has-tabs #hint {
        top: 48px;
      }
      #stage:hover #hint {
        opacity: 1;
      }
      #runningStatus {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        border-radius: 10px;
        background: rgba(20, 24, 30, 0.76);
        font-size: 12px;
        line-height: 1.35;
        opacity: 0;
        transition: opacity 0.16s ease;
        pointer-events: none;
        white-space: nowrap;
        overflow: hidden;
        z-index: 7;
      }
      #runningStatusLeft {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      #runningStatusRight {
        flex: 0 0 auto;
        color: rgba(247, 249, 252, .78);
      }
      body.show-running-status #runningStatus {
        opacity: 1;
      }
      #errorStatus {
        position: absolute;
        left: 8px;
        right: 8px;
        bottom: 8px;
        display: none;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 8px;
        align-items: start;
        padding: 9px 10px;
        border-radius: 11px;
        background: rgba(155, 24, 32, .92);
        border: 1px solid rgba(255, 102, 112, .65);
        box-shadow: 0 12px 30px rgba(0,0,0,.28);
        z-index: 9;
      }
      body.show-error-status #errorStatus {
        display: grid;
      }
      #errorStatusTitle {
        font-size: 12px;
        font-weight: 700;
        color: #fff;
        margin-bottom: 3px;
      }
      #errorStatusMessage {
        font-size: 11px;
        line-height: 1.45;
        color: rgba(255,255,255,.9);
        white-space: normal;
        word-break: break-word;
        max-height: 86px;
        overflow: auto;
      }
      #errorStatusClose {
        width: 22px;
        height: 22px;
        padding: 0;
        border: none;
        border-radius: 999px;
        background: rgba(255,255,255,.18);
        color: #fff;
        cursor: pointer;
        line-height: 1;
      }
      #errorStatusClose:hover {
        background: rgba(255,255,255,.28);
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <div id="dragHandle"></div>
      <div id="scaleAnchor"></div>
      <div id="tabsBar" role="tablist" aria-label="贴图图片列表"></div>
      <div id="frame">
        <div id="imageViewport">
          <img id="img" alt="截图结果" />
        </div>
      </div>
      <div id="toolbar">
        <button id="saveBtn" type="button" aria-label="保存图片" title="保存图片">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path fill="currentColor" d="M5 3h12.2L21 6.8V21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm1 2v5h10V5H6Zm2 11v3h8v-3H8Zm10 3h1V7.65L16.35 5H18v14Z"/>
          </svg>
        </button>
      </div>
      <div id="runningStatus">
        <div id="runningStatusLeft"></div>
        <div id="runningStatusRight"></div>
      </div>
      <div id="errorStatus">
        <div>
          <div id="errorStatusTitle"></div>
          <div id="errorStatusMessage"></div>
        </div>
        <button id="errorStatusClose" type="button" aria-label="关闭错误信息">×</button>
      </div>
    </div>
    <script src="./pin.js"></script>
  </body>
</html>
